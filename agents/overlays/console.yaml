pipeline:
  strategy_focus: "Interactive single-user mode; run stages sequentially with live feedback."
  infrastructure_context: "Developer workstation running Dark Factory CLI directly."
  deployment_targets: "Local filesystem output; no remote deployment."

tdd:
  strategy_focus: "Standard TDD cycle; run tests locally with immediate feedback."
  infrastructure_context: "Local Python environment with virtualenv."
  deployment_targets: "Tests run in-process; no CI integration."

code-review:
  strategy_focus: "Automated review only; surface critical issues and skip style enforcement."
  infrastructure_context: "Single-developer workflow; no PR process."
  deployment_targets: "Changes applied directly to working directory."

auditor:
  strategy_focus: "Lightweight audit; auto-pass if quality gates succeed."
  infrastructure_context: "Local quality gate execution."
  deployment_targets: "No deployment; output is local artifacts only."

eng-design:
  strategy_focus: "Rapid prototyping; minimal ceremony, focus on working code."
  infrastructure_context: "Python 3.11+ single-package project."
  deployment_targets: "Local execution via CLI."
  primary_language: "Python 3.11+"
  framework: "Click CLI, pytest"
  quality_tools: "ruff check + mypy --strict + pytest"
  coverage_target: "80% minimum"
