pipeline:
  strategy_focus: "Prioritise safety over speed. Run all stages sequentially with full validation."
  infrastructure_context: "Isolated CI runners with network restrictions."
  deployment_targets: "Manual approval gate before production deploy."

tdd:
  strategy_focus: "Write comprehensive tests; aim for 95%+ coverage."
  infrastructure_context: "Dedicated test environment with fixture databases."
  deployment_targets: "Test results must pass on all supported Python versions."

code-review:
  strategy_focus: "Thorough review of all changes including style, security, and performance."
  infrastructure_context: "Code review required from two approvers."
  deployment_targets: "Changes must be backward-compatible with previous release."

auditor:
  strategy_focus: "Manual sign-off required even if quality gates pass."
  infrastructure_context: "Full audit trail with artifact retention."
  deployment_targets: "Canary deploy with 1% traffic ramp before full rollout."

sa-lead:
  strategy_focus: "Favour reliability and compliance; avoid vendor lock-in where possible."
  infrastructure_context: "On-premises data centre with VMware virtualisation."
  deployment_targets: "Kubernetes on bare metal with Rancher management."
  iac_tool: "Ansible with Terraform for hybrid resources"
  cost_guardrails: "Quarterly capacity review with procurement approval for new hardware."
  compliance_framework: "ISO 27001 and GDPR"
  blast_radius_limit: "Single rack or network segment"
  adr_review_period: "3 months"

sa-compute:
  strategy_focus: "Maximise hardware utilisation; plan capacity quarterly."
  infrastructure_context: "VMware vSphere cluster with Kubernetes via Rancher."
  deployment_targets: "On-prem Kubernetes with dedicated node pools."
  compute_primitives: "VMs, Kubernetes pods, bare-metal for databases"
  container_orchestrator: "RKE2 managed by Rancher"
  iac_tool: "Ansible"
  cost_guardrails: "Hardware refresh cycle every 4 years; no over-provisioning."
  boot_time_limit: "180 seconds"

sa-database:
  strategy_focus: "Self-hosted databases with full operational control."
  infrastructure_context: "PostgreSQL and Redis on dedicated VMs."
  deployment_targets: "Primary-replica pairs across two data centres."
  data_stores: "PostgreSQL, Redis, MinIO (S3-compatible), Elasticsearch"
  replication_topology: "Synchronous replication within DC, async across DCs"
  backup_retention: "30-day automated, 1-year offsite tape"
  compliance_framework: "ISO 27001 and GDPR"
  secrets_manager: "HashiCorp Vault"
  read_latency_target: "5ms at P99"
  write_latency_target: "15ms at P99"
  iac_tool: "Ansible"
  failover_time_target: "30 seconds with manual confirmation"

sa-network:
  strategy_focus: "Defence in depth; strict segmentation between all tiers."
  infrastructure_context: "On-premises network with hardware firewalls."
  deployment_targets: "VLANs per tier with dedicated DMZ for public-facing services."
  load_balancer_type: "HAProxy or F5 for all traffic"
  private_connectivity: "MPLS or IPsec VPN for site-to-site"
  compliance_framework: "ISO 27001 and GDPR"
  dns_failover_ttl: "30 seconds"
  iac_tool: "Ansible"
  service_mesh: "Consul Connect or Linkerd"
  cidr_growth_headroom: "100% address space for future expansion"

sa-security:
  strategy_focus: "Maximum security controls; manual approval for all privilege escalations."
  infrastructure_context: "On-premises Active Directory with MFA."
  deployment_targets: "Hardware security modules (HSM) for key management."
  auth_provider: "Active Directory with SAML 2.0 federation"
  secrets_manager: "HashiCorp Vault with HSM backend"
  compliance_framework: "ISO 27001 and GDPR"
  secret_rotation: "30 days"
  iac_tool: "Ansible"
  escalation_sla: "5 minutes for P1, 30 minutes for P2"
  vuln_remediation_sla: "24 hours for critical, 7 days for high"

sa-monitoring:
  strategy_focus: "Conservative alerting; minimise false positives over fast detection."
  infrastructure_context: "Self-hosted Prometheus, Grafana, and Loki stack."
  deployment_targets: "Prometheus federation across data centres."
  monitoring_stack: "Prometheus, Grafana, Loki, Jaeger"
  metrics_cardinality_limit: "50,000 unique time series"
  log_retention: "90 days hot, 2 years cold on tape"
  trace_sample_rate: "5% in production, 100% in staging"
  alert_noise_target: "2 false positives"
  iac_tool: "Ansible"

sa-integration:
  strategy_focus: "Strict contract testing; require backward compatibility for all changes."
  infrastructure_context: "Self-hosted RabbitMQ and Kong API gateway."
  deployment_targets: "RabbitMQ cluster with quorum queues."
  message_broker: "RabbitMQ with quorum queues"
  sync_latency_target: "100ms at P99"
  compliance_framework: "ISO 27001 and GDPR"
  iac_tool: "Ansible"

sa-analytics:
  strategy_focus: "Batch-first analytics; prioritise accuracy over freshness."
  infrastructure_context: "Self-hosted ClickHouse and Apache Airflow."
  deployment_targets: "ClickHouse cluster with ZooKeeper coordination."
  analytics_platform: "ClickHouse with Airflow orchestration"
  compliance_framework: "ISO 27001 and GDPR"
  data_freshness_sla: "1 hour for operational data, 24 hours for warehouse"
  query_latency_target: "10 seconds"
  iac_tool: "Ansible"

sa-devops:
  strategy_focus: "Manual approval gates at every promotion boundary."
  infrastructure_context: "GitLab CI with on-premises runners."
  deployment_targets: "Kubernetes with Helm charts and manual release approval."
  cicd_platform: "GitLab CI"
  deployment_strategy: "Rolling update with manual canary verification"
  iac_tool: "Ansible with Terraform for infrastructure"
  pipeline_time_target: "Under 20 minutes for build-to-staging"
  rollback_time_target: "Under 5 minutes"

sa-mlai:
  strategy_focus: "Self-hosted ML platform; full data sovereignty."
  infrastructure_context: "On-premises GPU cluster with Kubeflow."
  deployment_targets: "Kubeflow on Kubernetes with dedicated GPU nodes."
  ml_compute: "On-prem GPU nodes (NVIDIA A100), Kubeflow pipelines"
  model_registry: "MLflow with MinIO artifact store"
  inference_latency_target: "50ms at P99"
  gpu_utilisation_target: "85% average during training jobs"
  compliance_framework: "ISO 27001 and GDPR"
  iac_tool: "Ansible"

sa-performance:
  strategy_focus: "Thorough performance validation; extended soak tests before release."
  infrastructure_context: "Dedicated performance lab with production-mirror hardware."
  deployment_targets: "72-hour soak test required before production promotion."
  load_test_tool: "Gatling with custom Scala scenarios"
  p99_latency_target: "200ms"
  throughput_target: "5,000 requests per second"
  cache_hit_target: "98%"
  page_load_budget: "under 1.5 seconds"
  api_response_budget: "under 100ms at P95"
  iac_tool: "Ansible"
  profiling_overhead: "1% CPU overhead"

eng-design:
  strategy_focus: "Thorough design review; all designs require peer approval before implementation."
  infrastructure_context: "Python 3.11+ monorepo with strict type checking."
  deployment_targets: "Docker containers on self-hosted Kubernetes."
  primary_language: "Python 3.11+"
  framework: "Click CLI, Textual TUI, pytest"
  quality_tools: "ruff check + mypy --strict + pytest + vulture"
  coverage_target: "95% minimum, 100% for security-critical paths"
